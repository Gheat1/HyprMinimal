# hyprpaper 0.8+ config (hyprtoolkit rewrite): wallpaper{} category replaces
# the old preload/wallpaper keywords.
#
# Rotation is driven by scripts/wallpaper-cycle.sh (5-min cycle + Super+W skip)
# via IPC, NOT by hyprpaper's native directory cycling — a directory path here
# would fight the script (any IPC request replaces the native cycle state).
# monitor = * (not empty): hyprlang can drop special-category entries keyed by
# an empty string; '*' is the documented-safe wildcard.
splash = 0
ipc = 1

wallpaper {
    monitor = *
    path = ~/.local/share/wallpapers/minimal/01-drift.png
    fit_mode = cover
}
