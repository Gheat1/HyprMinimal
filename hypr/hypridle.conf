general {
    lock_cmd       = pidof hyprlock || hyprlock      # avoid double-lock
    before_sleep_cmd = loginctl lock-session          # lock before sleep
    after_sleep_cmd  = hyprctl dispatch dpms on        # wake displays
}

# dim backlight after 2.5 min
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# lock after 5 min
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# screen off after 5.5 min
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# suspend after 20 min
listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
