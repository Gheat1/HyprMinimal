general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = $HOME/.config/hypr/scripts/on-resume.sh   # force a modeset so the panel comes back
}

# gently dim the backlight after 4 min idle (restores instantly on activity)
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# lock after 8 min idle
listener {
    timeout = 480
    on-timeout = loginctl lock-session
}

# NOTE: automatic screen-off (dpms) and auto-suspend were removed — they blanked
# the panel with no reliable wake. Use Super+O to blank manually (wakes on input),
# and re-add a dpms/suspend listener here only once resume is confirmed reliable.
