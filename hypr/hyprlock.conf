# hyprlock · monochrome lock screen

background {
    monitor =
    path = screenshot          # grab the live screen...
    blur_passes = 3            # ...and blur it
    blur_size = 7
    noise = 0.012
    contrast = 0.85
    brightness = 0.55
    vibrancy = 0.0             # keep it greyscale
}

# clock
label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 90
    color = rgba(e8e8e8ff)
    position = 0, 160
    halign = center
    valign = center
}

# date
label {
    monitor =
    text = cmd[update:60000] date "+%A, %d %B"
    font_family = JetBrainsMono Nerd Font
    font_size = 18
    color = rgba(8a8a90ff)
    position = 0, 70
    halign = center
    valign = center
}

# input field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(141417ff)
    inner_color = rgba(060607ff)
    font_color = rgba(e8e8e8ff)
    check_color = rgba(e8e8e8ff)
    fail_color = rgba(b04040ff)
    placeholder_text = <span foreground="#8a8a90">password</span>
    fade_on_empty = false
    rounding = 8
    position = 0, -40
    halign = center
    valign = center
}

# user
label {
    monitor =
    text =   $USER
    font_family = JetBrainsMono Nerd Font
    font_size = 14
    color = rgba(5a5a60ff)
    position = 0, -110
    halign = center
    valign = center
}
