include monochrome.conf

# ── Font ─────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
# Slightly looser line spacing reads nicer
modify_font      cell_height 110%
disable_ligatures never

# ── Cursor: smooth trailing caret animation ──────────────────────────
cursor_shape                 beam
cursor_beam_thickness        1.6
cursor_blink_interval        0.5 ease-in-out
cursor_stop_blinking_after   8.0
# The animated trail that follows the caret as it moves
cursor_trail                 1
cursor_trail_decay           0.1 0.35
cursor_trail_start_threshold 2

# ── Window & layout ──────────────────────────────────────────────────
window_padding_width      12
placement_strategy        center
hide_window_decorations   yes
background_opacity         0.80
dynamic_background_opacity yes
confirm_os_window_close    0
inactive_text_alpha        0.85

# ── Tab bar (monochrome, slim) ───────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      2
tab_title_template    " {index}: {title} "
active_tab_foreground   #060607
active_tab_background   #bfbab1
active_tab_font_style   bold
inactive_tab_foreground #86817a
inactive_tab_background #0d0d0f
inactive_tab_font_style normal

# ── Bell ─────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell no

# ── Scrollback & mouse ───────────────────────────────────────────────
scrollback_lines          10000
mouse_hide_wait           2.0
copy_on_select            yes
strip_trailing_spaces     smart
url_style                 curly
detect_urls               yes

# ── Performance ──────────────────────────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes
