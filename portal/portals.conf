# Portal backend routing for Hyprland.
# You have xdg-desktop-portal-{hyprland,kde,gtk} installed. Without this file the
# portal layer can hand a screenshare request to the KDE backend, which can't
# capture under Hyprland -> Google Meet/OBS hang or show a black screen.
#
# Fix: route screen capture to the Hyprland backend, keep the KDE file picker
# (plasma-integration) you already use, and fall back to gtk for the rest.
[preferred]
default=hyprland;gtk
org.freedesktop.impl.portal.ScreenCast=hyprland
org.freedesktop.impl.portal.Screenshot=hyprland
org.freedesktop.impl.portal.FileChooser=kde
